<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Ministry Pro</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#1e3a8a;color:white;padding:15px;text-align:center}
.container{padding:20px}
.card{background:white;border-radius:15px;padding:15px;margin:10px 0;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
input,button{padding:10px;margin:5px;width:100%;border-radius:10px;border:1px solid #ddd}
button{background:#2563eb;color:white;border:none}
img{width:100%;border-radius:10px}
.hidden{display:none}
</style>
</head>

<body>

<header>Amistad Fuertes Kids</header>

<div class="container" id="loginView">
<h2>Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div class="container hidden" id="appView">

<div class="card">
<h3>Registrar Niño</h3>

<input id="kidName" placeholder="Nombre del niño">
<input type="file" accept="image/*" capture="camera" id="kidPhoto">

<h4>Adultos</h4>
<div id="adultsContainer"></div>
<button onclick="addAdult()">+ Adulto</button>

<button onclick="saveAll()">Guardar Todo</button>
</div>

<div class="card">
<h3>Lista</h3>
<div id="list"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyoDCt3oslNuX723ZhDXnyG_cS8O7jhpnScIgyB1wcPUFtacplz6d48qGuFR7Z-KvUs/exec";

// BASE64
function toBase64(file){
return new Promise((res)=>{
if(!file) return res("");
const reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(file);
});
}

// LOGIN
async function login(){

const formData = new URLSearchParams();
formData.append("action","login");
formData.append("username",document.getElementById("user").value);
formData.append("password",document.getElementById("pass").value);

const r = await fetch(API,{method:"POST",body:formData});
const d = await r.json();

if(d.success){
document.getElementById("loginView").classList.add("hidden");
document.getElementById("appView").classList.remove("hidden");
load();
}else{
alert("Login incorrecto");
}
}

// UI ADULTOS
function addAdult(){
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Nombre" class="name">
<input placeholder="Teléfono" class="phone">
<input type="file" accept="image/*" capture="camera" class="photo">
`;

document.getElementById("adultsContainer").appendChild(div);
}

// GUARDAR TODO
async function saveAll(){

const name=document.getElementById("kidName").value;
const kidFile=document.getElementById("kidPhoto").files[0];
const kidPhoto=await toBase64(kidFile);

// GUARDAR NIÑO
const fdKid = new URLSearchParams();
fdKid.append("action","addKid");
fdKid.append("name",name);
fdKid.append("photo",kidPhoto);

const kidRes = await fetch(API,{method:"POST",body:fdKid});
const kidData = await kidRes.json();
const kidId = kidData.id;

// ADULTOS
const blocks=document.querySelectorAll("#adultsContainer .card");

for(let b of blocks){

const aName=b.querySelector(".name").value;
const aPhone=b.querySelector(".phone").value;
const file=b.querySelector(".photo").files[0];
const photo=await toBase64(file);

const fdAdult = new URLSearchParams();
fdAdult.append("action","addAdult");
fdAdult.append("name",aName);
fdAdult.append("phone",aPhone);
fdAdult.append("photo",photo);

const aRes = await fetch(API,{method:"POST",body:fdAdult});
const aData = await aRes.json();

// RELACION
const fdRel = new URLSearchParams();
fdRel.append("action","linkAdultToKid");
fdRel.append("kid_id",kidId);
fdRel.append("adult_id",aData.id);

await fetch(API,{method:"POST",body:fdRel});

}

alert("Guardado completo");
load();
}

// CARGAR DATOS
async function load(){

const fd = new URLSearchParams();
fd.append("action","getFullData");

const r = await fetch(API,{method:"POST",body:fd});
const data = await r.json();

let html="";

data.forEach(k=>{
html+=`
<div class="card">
<h3>${k.name}</h3>
<img src="${k.photo}">
<h4>Adultos:</h4>
${k.adults.map(a=>`
<p>${a.name}</p>
<img src="${a.photo}">
`).join("")}
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

</script>

</body>
</html>
