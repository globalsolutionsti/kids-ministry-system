<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Ministry Pro</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
Amistad Fuertes Kids
<button id="logoutBtn" class="logout-btn hidden" onclick="logout()">Salir</button>
</header>

<!-- LOGIN -->
<div class="login-container" id="loginView">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="container hidden" id="appView">

<div class="card">
<h3>Registrar Niño</h3>

<input id="kidName" placeholder="Nombre del niño">

<button onclick="openCamera('kid')" class="camera-btn">📸 Tomar Foto Niño (a)</button>
<img id="kidPreview" class="preview hidden">

<h4>Adultos</h4>
<div id="adultsContainer"></div>
<button onclick="addAdult()">+ Adulto</button>

<button onclick="saveAll()">Guardar Todo</button>
</div>

<div class="card">
<h3>Lista</h3>
<div id="list"></div>
</div>

</div>

<!-- CAMERA -->
<video id="camera" autoplay class="hidden"></video>
<button id="captureBtn" class="hidden">Capturar</button>

<script>
const API="https://script.google.com/macros/s/AKfycbx-PFpJ7Llnw-YVW1O1Z-PhW_kNiwGo4m_MF5me6FN4VF7WzizEjRAOMZHEAuydisaD/exec";

let stream;
let currentType = null;
let currentAdultContainer = null;

// 📸 ABRIR CÁMARA
async function openCamera(type, btn=null){

currentType = type;

if(type === "adult"){
  currentAdultContainer = btn.closest(".adult-form");
}

stream = await navigator.mediaDevices.getUserMedia({ video: true });

const video = document.getElementById("camera");
video.srcObject = stream;
video.classList.remove("hidden");

document.getElementById("captureBtn").classList.remove("hidden");
}

// 📸 CAPTURAR FOTO
document.getElementById("captureBtn").onclick = function(){

const video = document.getElementById("camera");

const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0);

const base64 = canvas.toDataURL("image/png");

// apagar cámara
stream.getTracks().forEach(track=>track.stop());
video.classList.add("hidden");
this.classList.add("hidden");

// 🔥 GUARDAR SEGÚN TIPO
if(currentType === "kid"){

const img = document.getElementById("kidPreview");
img.src = base64;
img.classList.remove("hidden");
img.dataset.img = base64;

}else if(currentType === "adult" && currentAdultContainer){

const img = currentAdultContainer.querySelector(".preview");
img.src = base64;
img.classList.remove("hidden");
img.dataset.img = base64;

}
};

// LOGIN
async function login(){

const fd = new URLSearchParams();
fd.append("action","login");
fd.append("username",document.getElementById("user").value);
fd.append("password",document.getElementById("pass").value);

const r = await fetch(API,{method:"POST",body:fd});
const d = await r.json();

if(d.success){
document.getElementById("loginView").classList.add("hidden");
document.getElementById("appView").classList.remove("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");
load();
}else{
alert("Login incorrecto");
}
}

// LOGOUT
function logout(){
location.reload();
}

// 👨‍👩‍👧 ADULTOS
function addAdult(){

const div=document.createElement("div");
div.className="card adult-form";

div.innerHTML=`
<input placeholder="Nombre" class="name">
<input placeholder="Teléfono" class="phone">

<button onclick="openCamera('adult', this)">📸 Tomar foto</button>

<img class="preview hidden">
`;

document.getElementById("adultsContainer").appendChild(div);
}

// 💾 GUARDAR TODO
async function saveAll(){

const kidPhoto=document.getElementById("kidPreview").dataset.img || "";

const fdKid=new URLSearchParams();
fdKid.append("action","addKid");
fdKid.append("name",kidName.value);
fdKid.append("photo",kidPhoto);

const kidRes=await fetch(API,{method:"POST",body:fdKid});
const kidData=await kidRes.json();

const blocks=document.querySelectorAll(".adult-form");

for(let b of blocks){

const photo = b.querySelector(".preview").dataset.img || "";

const fdAdult=new URLSearchParams();
fdAdult.append("action","addAdult");
fdAdult.append("name",b.querySelector(".name").value);
fdAdult.append("phone",b.querySelector(".phone").value);
fdAdult.append("photo",photo);

const aRes=await fetch(API,{method:"POST",body:fdAdult});
const aData=await aRes.json();

const fdRel=new URLSearchParams();
fdRel.append("action","linkAdultToKid");
fdRel.append("kid_id",kidData.id);
fdRel.append("adult_id",aData.id);

await fetch(API,{method:"POST",body:fdRel});
}

alert("Guardado");
load();
}

// 📊 LOAD
async function load(){

const fd=new URLSearchParams();
fd.append("action","getFullData");

const r=await fetch(API,{method:"POST",body:fd});
const data=await r.json();

let html="";

data.forEach(k=>{
html+=`
<div class="dashboard-card">

  <div class="kid-section">
    <img class="kid-photo" src="${k.photo}">
    <div class="kid-name">${k.name}</div>
  </div>

  <div class="adults">
    ${k.adults.map(a=>`
      <div class="adult">
        <img src="${a.photo}">
        <div class="adult-name">${a.name}</div>
      </div>
    `).join("")}
  </div>

</div>
`;
});

list.innerHTML=html;
}

</script>

</body>
</html>
