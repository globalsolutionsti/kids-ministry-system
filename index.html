<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministerio Kids</title>

<link rel="stylesheet" href="styles.css?v=5">
</head>

<body>

<header>
Ministerio Kids - Gestión de Niños (as)
<button id="logoutBtn" class="logout-btn hidden" onclick="logout()">Salir</button>
</header>

<!-- LOGIN -->
<div class="login-container" id="loginView">
  <div class="login-box">
    <h2>Bienvenido</h2>
    <p>Ministerio Kids</p>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>
</div>

<!-- MENU -->
<div class="container hidden" id="menuView">
  <div class="menu-grid">

    <div class="menu-card" onclick="openView('catalogView')">
      📋
      <h3>Base de Datos Kids</h3>
    </div>

    <div class="menu-card" onclick="openView('checkinView')">
      🟢
      <h3>Entrada</h3>
    </div>

    <div class="menu-card" onclick="openView('checkoutView')">
      🔐
      <h3>Salida</h3>
    </div>

  </div>
</div>

<!-- CATALOGO -->
<div class="container hidden" id="catalogView">

<button onclick="goMenu()" class="btn-secondary">⬅ Volver</button>

<div class="card">
<h3>Registrar Niño (a)</h3>

<input id="kidName" placeholder="Nombre del niño (a)">

<!-- BOTONES FOTO -->
<div class="btn-group">
<button onclick="openCamera('kid')" class="camera-btn btn-main">📸 Tomar Fotografía</button>
<button onclick="document.getElementById('fileKid').click()" class="btn-secondary">📁 Subir Fotografía</button>
<input type="file" id="fileKid" accept="image/*" class="hidden" onchange="uploadImage(event,'kid')">
</div>

<img id="kidPreview" class="preview hidden">

<h4>Adultos Autorizados</h4>
<div id="adultsContainer"></div>
<button onclick="addAdult()" class="btn-secondary">Agregar Adulto Autorizado</button>

<button onclick="saveAll()" class="btn-main">Guardar Información en Base de Datos</button>
</div>

<div class="card">
<h3>Lista</h3>
<div id="list"></div>

<div class="pagination">
<button onclick="prevPage()">⬅</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">➡</button>
</div>

</div>

</div>

<!-- CHECK-IN -->
<div class="container hidden" id="checkinView">
<button onclick="goMenu()">⬅ Volver</button>
<div class="card">
<h3>Entrada de Niño</h3>
<p>🚧 Aquí haremos el check-in en la Fase 2</p>
</div>
</div>

<!-- CHECK-OUT -->
<div class="container hidden" id="checkoutView">
<button onclick="goMenu()">⬅ Volver</button>
<div class="card">
<h3>Salida / Entrega</h3>
<p>🚧 Aquí haremos la validación en la Fase 2</p>
</div>
</div>

<!-- CAMERA -->
<video id="camera" autoplay class="hidden"></video>
<button id="captureBtn" class="hidden">Capturar</button>

<script>
const API="https://script.google.com/macros/s/AKfycbx-PFpJ7Llnw-YVW1O1Z-PhW_kNiwGo4m_MF5me6FN4VF7WzizEjRAOMZHEAuydisaD/exec";

let stream;
let currentType=null;
let currentAdultContainer=null;

let allData=[];
let currentPage=1;
const perPage=10;

/* =========================
   🔥 NAVEGACIÓN (FIX ERROR)
========================= */
function openView(view){
document.getElementById("menuView").classList.add("hidden");
document.getElementById("catalogView").classList.add("hidden");
document.getElementById("checkinView").classList.add("hidden");
document.getElementById("checkoutView").classList.add("hidden");

document.getElementById(view).classList.remove("hidden");

if(view==="catalogView") load();
}

function goMenu(){
document.getElementById("menuView").classList.remove("hidden");
document.getElementById("catalogView").classList.add("hidden");
document.getElementById("checkinView").classList.add("hidden");
document.getElementById("checkoutView").classList.add("hidden");
}

/* =========================
   📸 CÁMARA
========================= */
async function openCamera(type, btn=null){
currentType=type;

if(type==="adult"){
currentAdultContainer=btn.closest(".adult-form");
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

camera.srcObject=stream;
camera.classList.remove("hidden");
captureBtn.classList.remove("hidden");
}

captureBtn.onclick=function(){

const canvas=document.createElement("canvas");
canvas.width=camera.videoWidth;
canvas.height=camera.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(camera,0,0);

const base64=canvas.toDataURL("image/png");

stream.getTracks().forEach(t=>t.stop());
camera.classList.add("hidden");
captureBtn.classList.add("hidden");

setImage(base64);
};

/* =========================
   📁 SUBIR IMAGEN
========================= */
function uploadImage(e,type,container=null){

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(ev){
const base64=ev.target.result;

if(type==="kid"){
setImage(base64);
}else{
setImage(base64,container);
}
};

reader.readAsDataURL(file);
}

/* =========================
   🧠 SET IMAGE
========================= */
function setImage(base64,container=null){

if(currentType==="kid" || !container){
kidPreview.src=base64;
kidPreview.classList.remove("hidden");
kidPreview.dataset.img=base64;
}else{
const img=container.querySelector(".preview");
img.src=base64;
img.classList.remove("hidden");
img.dataset.img=base64;
}
}

/* =========================
   🔐 LOGIN
========================= */
async function login(){
const fd=new URLSearchParams();
fd.append("action","login");
fd.append("username",user.value);
fd.append("password",pass.value);

const r=await fetch(API,{method:"POST",body:fd});
const d=await r.json();

if(d.success){
loginView.classList.add("hidden");
menuView.classList.remove("hidden");
logoutBtn.classList.remove("hidden");
}else alert("Login incorrecto");
}

function logout(){location.reload();}

/* =========================
   👨‍👩‍👧 ADULTOS
========================= */
function addAdult(){

const div=document.createElement("div");
div.className="card adult-form";

div.innerHTML=`
<input placeholder="Nombre" class="name">
<input placeholder="Teléfono" class="phone">

<div class="btn-group">
<button onclick="openCamera('adult', this)">📸 Tomar</button>
<button onclick="this.nextElementSibling.click()">📁 Subir</button>
<input type="file" accept="image/*" class="hidden" onchange="uploadImage(event,'adult', this.closest('.adult-form'))">
</div>

<img class="preview hidden">
`;

adultsContainer.appendChild(div);
}

/* =========================
   💾 GUARDAR
========================= */
async function saveAll(){

const kidPhoto=kidPreview.dataset.img || "";

const fdKid=new URLSearchParams();
fdKid.append("action","addKid");
fdKid.append("name",kidName.value);
fdKid.append("photo",kidPhoto);

const kidRes=await fetch(API,{method:"POST",body:fdKid});
const kidData=await kidRes.json();

const blocks=document.querySelectorAll(".adult-form");

for(let b of blocks){

const fdAdult=new URLSearchParams();
fdAdult.append("action","addAdult");
fdAdult.append("name",b.querySelector(".name").value);
fdAdult.append("phone",b.querySelector(".phone").value);
fdAdult.append("photo",b.querySelector(".preview").dataset.img || "");

const aRes=await fetch(API,{method:"POST",body:fdAdult});
const aData=await aRes.json();

const fdRel=new URLSearchParams();
fdRel.append("action","linkAdultToKid");
fdRel.append("kid_id",kidData.id);
fdRel.append("adult_id",aData.id);

await fetch(API,{method:"POST",body:fdRel});
}

kidName.value="";
kidPreview.src="";
kidPreview.classList.add("hidden");
delete kidPreview.dataset.img;
adultsContainer.innerHTML="";

alert("Registro guardado");
load();
}

/* =========================
   📊 LOAD + RENDER
========================= */
async function load(){
const fd=new URLSearchParams();
fd.append("action","getFullData");
const r=await fetch(API,{method:"POST",body:fd});
allData=await r.json();
currentPage=1;
render();
}

function render(){
const start=(currentPage-1)*perPage;
const end=start+perPage;
const data=allData.slice(start,end);

let html="";

data.forEach(k=>{
html+=`
<div class="dashboard-card">

<div class="kid-section">
<img class="kid-photo" src="${k.photo}">
<div class="kid-name">${k.name}</div>
</div>

<div class="adults">
${k.adults.map(a=>`
<div class="adult">
<img src="${a.photo}">
<div class="adult-name">${a.name}</div>
</div>`).join("")}
</div>

</div>`;
});

list.innerHTML=html;
pageInfo.innerText=`Página ${currentPage} de ${Math.ceil(allData.length/perPage)}`;
}

function nextPage(){
if(currentPage*perPage<allData.length){
currentPage++;
render();
}
}

function prevPage(){
if(currentPage>1){
currentPage--;
render();
}
}
</script>

</body>
</html>
