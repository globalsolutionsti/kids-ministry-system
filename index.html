<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Ministry Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f7fb}
header{background:#1e3a8a;color:white;padding:15px;text-align:center}
.container{padding:20px}
.card{background:white;border-radius:15px;padding:15px;margin:10px 0;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
input,button{padding:10px;margin:5px;width:100%;border-radius:10px;border:1px solid #ddd}
button{background:#2563eb;color:white;border:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
img{width:100%;border-radius:10px}
.hidden{display:none}
</style>
</head>
<body>
<header>Amistad Fuertes Kids</header>

<div class="container" id="loginView">
<h2>Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div class="container hidden" id="appView">
<h2>Dashboard</h2>

<div class="card">
<h3>Registrar Niño</h3>
<input id="kidName" placeholder="Nombre">
<input type="file" accept="image/*" capture="camera" id="kidPhoto">

<h4>Adultos Autorizados</h4>
<div id="adultsContainer"></div>
<button onclick="addAdultField()">+ Agregar Adulto</button>

<button onclick="saveKidFull()">Guardar Registro Completo</button>
</div>

<div class="card">
<h3>Lista de Niños</h3>
<div id="kidsList"></div>
</div>
</div>

<script>
const API="PEGA_TU_API";

function toBase64(file){
return new Promise((res)=>{
const reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(file);
});
}

async function login(){
const username=document.getElementById('user').value;
const password=String(document.getElementById('pass').value);

const r=await fetch(API,{method:'POST',body:JSON.stringify({action:'login',username,password})});
const d=await r.json();

if(d.success){
document.getElementById('loginView').classList.add('hidden');
document.getElementById('appView').classList.remove('hidden');
loadKids();
}else alert('Error');
}

function addAdultField(){
const div=document.createElement('div');
div.className='card';
div.innerHTML=`
<input placeholder="Nombre adulto" class="adultName">
<input placeholder="Teléfono" class="adultPhone">
<input type="file" accept="image/*" capture="camera" class="adultPhoto">
`;
document.getElementById('adultsContainer').appendChild(div);
}

async function saveKidFull(){
const name=document.getElementById('kidName').value;
const kidFile=document.getElementById('kidPhoto').files[0];
const kidPhoto=await toBase64(kidFile);

const kidRes=await fetch(API,{method:'POST',body:JSON.stringify({action:'addKid',name,photo:kidPhoto})});
const kidData=await kidRes.json();
const kidId=kidData.id;

const adultBlocks=document.querySelectorAll('#adultsContainer .card');

for(let block of adultBlocks){
const aName=block.querySelector('.adultName').value;
const aPhone=block.querySelector('.adultPhone').value;
const file=block.querySelector('.adultPhoto').files[0];
const photo=await toBase64(file);

const aRes=await fetch(API,{method:'POST',body:JSON.stringify({action:'addAdult',name:aName,phone:aPhone,photo})});
const aData=await aRes.json();

await fetch(API,{method:'POST',body:JSON.stringify({action:'linkAdultToKid',kid_id:kidId,adult_id:aData.id})});
}

alert('Registro completo');
loadKids();
}

async function loadKids(){
const r=await fetch(API,{method:'POST',body:JSON.stringify({action:'getFullData'})});
const data=await r.json();

let html='';

data.forEach(k=>{
html+=`<div class="card">
<h4>${k.name}</h4>
<img src="${k.photo}">
<p>Adultos:</p>
${k.adults.map(a=>`<p>${a.name}</p><img src="${a.photo}">`).join('')}
</div>`;
});

document.getElementById('kidsList').innerHTML=html;
}
</script>
</body>
</html>
